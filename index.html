<title>Partner Pipeline Dashboard — Apr 2025–Mar 2026 · Updated Apr 6, 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F4F0;color:#1A1A18;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:0 1.5rem 3rem}
nav{background:#1A1A18;padding:.75rem 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.nav-tab{background:transparent;border:1px solid #444;color:#ccc;padding:.4rem .9rem;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap}
.nav-tab.active{background:#378ADD;border-color:#378ADD;color:#fff;font-weight:600}
.nav-tab:hover:not(.active){border-color:#888;color:#fff}
h1{font-size:1.5rem;font-weight:700;color:#1A1A18;padding:1.5rem 0 .25rem}
.subtitle{color:#888780;font-size:.875rem;margin-bottom:1.25rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.metric-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.metric-card{background:#fff;border-radius:8px;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:3px solid #D3D1C7}
.metric-card--pipeline{border-top-color:#378ADD}
.metric-card--weighted{border-top-color:#1D6FAE}
.metric-card--won{border-top-color:#059669}
.metric-label{font-size:.7rem;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.metric-value{font-size:1.75rem;font-weight:700;color:#1A1A18;line-height:1}
.metric-sub{font-size:.75rem;color:#888780;margin-top:.4rem}
.chart-full{background:#fff;border-radius:8px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.chart-card{background:#fff;border-radius:8px;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem}
.chart-title{font-size:.8rem;font-weight:700;color:#1A1A18;text-transform:uppercase;letter-spacing:.04em}
.note{font-size:.7rem;color:#888780;margin-bottom:.5rem}
.legend{display:flex;flex-wrap:wrap;gap:.75rem;font-size:.7rem;color:#888780;margin-bottom:.5rem}
.legend .ld{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle}
.tog-row{display:flex;gap:.35rem;flex-wrap:wrap}
.tog{background:#F5F4F0;border:1px solid #D3D1C7;color:#888780;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-size:.7rem}
.tog.on{background:#378ADD;border-color:#378ADD;color:#fff}
table.sc-tbl{width:100%;border-collapse:collapse;font-size:.75rem}
table.sc-tbl th{background:#1A1A18;color:#fff;padding:.4rem .6rem;text-align:left;font-weight:600}
table.sc-tbl td{padding:.4rem .6rem;border-bottom:1px solid #E8E7E3}
table.sc-tbl tr:hover td{background:#F5F4F0}
.score-bar{height:6px;border-radius:3px;background:#E8E7E3;margin-top:3px}
.score-fill{height:100%;border-radius:3px;background:#378ADD}
.tier-badge{display:inline-block;padding:.15rem .45rem;border-radius:3px;font-size:.65rem;font-weight:700;text-transform:uppercase}
select{padding:.35rem .6rem;border:1px solid #D3D1C7;border-radius:4px;font-size:.8rem;background:#fff}
.filter-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.filter-row label{font-size:.75rem;color:#888780;font-weight:600}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}

/* ── Goals Tracker ── */
.goals-section{background:#fff;border-radius:8px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.goals-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.75rem}
.goal-row{display:flex;flex-direction:column;gap:.3rem;padding:.75rem;border-radius:6px;background:#F9F8F5;border:1px solid #E8E7E3}
.goal-row-header{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.goal-label{font-size:.75rem;font-weight:700;color:#1A1A18;flex:1}
.goal-values{display:flex;align-items:center;gap:.4rem;font-size:.75rem}
.goal-actual{font-weight:700;color:#1A1A18}
.goal-sep{color:#ccc}
.goal-target-input{width:90px;padding:.2rem .4rem;border:1px solid #D3D1C7;border-radius:4px;font-size:.75rem;text-align:right;background:#fff}
.goal-bar-wrap{height:6px;border-radius:3px;background:#E8E7E3;margin-top:.25rem}
.goal-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.goal-pct{font-size:.65rem;color:#888780;text-align:right;margin-top:.15rem}
.goals-note{font-size:.7rem;color:#888780;margin-top:.75rem;font-style:italic}

</style>

<div class="app">
<div id="tab-overview" class="tab-panel active"></div><div id="tab-affiliated" class="tab-panel"></div><div id="tab-cosell" class="tab-panel"></div><div id="tab-won" class="tab-panel"></div><div id="tab-dealsreg2" class="tab-panel"></div><div id="tab-dealexp" class="tab-panel"></div><div id="tab-contacts" class="tab-panel"></div><div id="tab-mktcal" class="tab-panel"></div><div id="tab-eventplay" class="tab-panel"></div><div id="tab-entscorecard" class="tab-panel"></div><div id="tab-sellerscorecard" class="tab-panel"></div><div id="tab-resourcing" class="tab-panel"></div><div id="tab-closing" class="tab-panel"></div>
</div>
<script>

// ── Mini charting library (no dependencies) ───────────────────────────────
const MiniChart = {
  _charts: {},
  _fmt: v => !v ? '$0' : '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v)),
  _fmtCount: v => v + ' deals',

  destroy(id) {
    if (this._charts[id]) { this._charts[id] = null; }
    const el = document.getElementById(id);
    if (el) { el.innerHTML = ''; }
  },

  _tooltip(container, html) {
    let tip = container.querySelector('.mc-tip');
    if (!tip) {
      tip = document.createElement('div');
      tip.className = 'mc-tip';
      tip.style.cssText = 'position:absolute;background:rgba(26,26,24,.92);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;display:none;z-index:99;white-space:nowrap;line-height:1.6';
      container.appendChild(tip);
    }
    tip.innerHTML = html;
    return tip;
  },

  bar(id, labels, datasets, opts={}) {
    // opts.stacked = true for stacked bars
    this.destroy(id);
    const wrap = document.getElementById(id);
    if (!wrap) return;
    wrap.style.position = 'relative';

    const isHoriz = opts.horizontal || false;
    const isCount = opts.yFmt === 'count';
    const fmt = isCount ? v => v : this._fmt;

    // For stacked charts, max is the sum of all series per group; otherwise max single value
    const isStackedForMax = opts.stacked || false;
    let maxVal;
    if (isStackedForMax && !isHoriz) {
      const groupSums = (datasets[0]?.data||[]).map((_,gi) => datasets.reduce((s,ds)=>s+(ds.data[gi]||0),0));
      maxVal = Math.max(...groupSums, 1);
    } else {
      const allVals = datasets.flatMap(d => d.data.filter(v=>v>0));
      maxVal = Math.max(...allVals, 1);
    }
    const numGroups = labels.length;
    const numSeries = datasets.length;

    const styleH = parseInt((wrap.style.height||wrap.parentElement?.style?.height||'').replace('px',''))||0;
    const rect = wrap.getBoundingClientRect();
    const W = rect.width || wrap.clientWidth || wrap.parentElement?.clientWidth || 600;
    const H = rect.height || wrap.clientHeight || styleH || 220;
    const padL = isHoriz ? 90 : 48;
    const padR = 10;
    const padT = (opts.stacked||false) ? 30 : 20;
    const padB = isHoriz ? 30 : 52;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.style.overflow = 'visible';

    const g = (tag, attrs={}) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      return el;
    };
    const txt = (x,y,content,attrs={}) => {
      const el = g('text', {x,y,'font-size':'10','font-family':'sans-serif','fill':'#888780',...attrs});
      el.textContent = content;
      return el;
    };

    // Grid lines
    const numGridLines = 4;
    for (let i = 0; i <= numGridLines; i++) {
      const ratio = i / numGridLines;
      const valHoriz = maxVal * ratio;          // horiz: 0 on left, max on right
      const valVert  = maxVal * (1 - ratio);    // vert:  max on top, 0 on bottom
      if (isHoriz) {
        const x = padL + ratio * plotW;
        svg.appendChild(g('line',{x1:x,y1:padT,x2:x,y2:padT+plotH,stroke:'#E8E7E3','stroke-width':0.5}));
        svg.appendChild(txt(x, padT+plotH+12, fmt(valHoriz), {'text-anchor':'middle'}));
      } else {
        const y = padT + ratio * plotH;
        svg.appendChild(g('line',{x1:padL,y1:y,x2:padL+plotW,y2:y,stroke:'#E8E7E3','stroke-width':0.5}));
        svg.appendChild(txt(padL-4, y+3, fmt(valVert), {'text-anchor':'end'}));
      }
    }

    // Bars
    const isStacked = opts.stacked || false;
    const groupW = isHoriz ? plotH/numGroups : plotW/numGroups;
    const barW = isStacked ? Math.max(4, groupW * 0.7) : Math.max(2, (groupW * 0.8) / numSeries);
    const barGap = isStacked ? groupW * 0.15 : groupW * 0.1;
    const tip = this._tooltip(wrap, '');

    // For stacked: track cumulative heights per group
    const stackBase = new Array(labels.length).fill(0);

    datasets.forEach((ds, si) => {
      ds.data.forEach((val, gi) => {
        if (!val) return;
        const ratio = val / maxVal;
        let x, y, bw, bh;
        if (isHoriz) {
          bw = ratio * plotW;
          bh = Math.max(2, barW - 1);
          x = padL + (isStacked ? stackBase[gi] * plotW : 0);
          y = padT + gi * groupW + barGap + (isStacked ? 0 : si * barW);
        } else {
          bw = Math.max(3, barW - 1);
          bh = ratio * plotH;
          x = padL + gi * groupW + barGap + (isStacked ? 0 : si * barW);
          y = padT + plotH - bh - (isStacked ? stackBase[gi] * plotH : 0);
        }
        if (isStacked) stackBase[gi] += ratio;
        const rect = g('rect',{x,y,width:bw,height:bh,fill:ds.backgroundColor||'#378ADD',rx:si===0&&isStacked?'0 0 2 2':2});
        rect.addEventListener('mousemove', e => {
          const box = wrap.getBoundingClientRect();
          tip.style.left = (e.clientX - box.left + 10) + 'px';
          tip.style.top = (e.clientY - box.top - 30) + 'px';
          tip.style.display = 'block';
          tip.innerHTML = `<b>${labels[gi]}</b><br>${ds.label||''}: ${fmt(val)}`;
        });
        rect.addEventListener('mouseleave', () => { tip.style.display='none'; });
        svg.appendChild(rect);
      });
    });

    // Labels
    labels.forEach((lbl, gi) => {
      const shortLbl = lbl.length > 8 ? lbl.slice(0,7)+'…' : lbl;
      if (isHoriz) {
        const y = padT + gi * groupW + groupW/2 + 4;
        svg.appendChild(txt(padL-4, y, shortLbl, {'text-anchor':'end','font-size':'10'}));
      } else {
        const x = padL + gi * groupW + groupW/2;
        // Rotated label
        const t = txt(x, padT+plotH+14, lbl, {'text-anchor':'end','font-size':'9','transform':`rotate(-35,${x},${padT+plotH+14})`});
        svg.appendChild(t);
      }
    });

    // Legend
    if (datasets.length > 1) {
      datasets.forEach((ds, i) => {
        const lx = padL + i * 90;
        const ly = H - 6;
        svg.appendChild(g('rect',{x:lx,y:ly-7,width:10,height:8,fill:ds.backgroundColor||'#378ADD',rx:1}));
        svg.appendChild(txt(lx+13, ly, ds.label||'', {'fill':'#888780','font-size':'9'}));
      });
    }

    this._charts[id] = true;
    wrap.appendChild(svg);
  },

  line(id, labels, datasets) {
    this.destroy(id);
    const wrap = document.getElementById(id);
    if (!wrap) return;
    wrap.style.position = 'relative';

    const allVals = datasets.flatMap(d => d.data.filter(v=>v>0));
    const maxVal = Math.max(...allVals, 1);
    const styleH = parseInt((wrap.style.height||wrap.parentElement?.style?.height||'').replace('px',''))||0;
    const rect = wrap.getBoundingClientRect();
    const W = rect.width || wrap.clientWidth || wrap.parentElement?.clientWidth || 700;
    const H = rect.height || wrap.clientHeight || styleH || 260;
    const padL = 55, padR = 20, padT = 24, padB = 55;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;
    const n = labels.length;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','100%');
    svg.setAttribute('height',H);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

    const g = (tag, attrs={}) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      return el;
    };
    const txt = (x,y,content,attrs={}) => {
      const el = g('text',{x,y,'font-size':'10','font-family':'sans-serif','fill':'#888780',...attrs});
      el.textContent=content; return el;
    };
    const fmt = this._fmt;

    // Grid
    for (let i=0; i<=4; i++) {
      const ratio = i/4;
      const val = maxVal*(1-ratio);
      const y = padT + ratio*plotH;
      svg.appendChild(g('line',{x1:padL,y1:y,x2:padL+plotW,y2:y,stroke:'#E8E7E3','stroke-width':0.5}));
      svg.appendChild(txt(padL-4,y+3,fmt(val),{'text-anchor':'end'}));
    }

    const tip = this._tooltip(wrap,'');

    datasets.forEach(ds => {
      const pts = labels.map((lbl,i) => ({
        x: padL + i/(n-1)*plotW,
        y: padT + (1 - (ds.data[i]||0)/maxVal)*plotH,
        val: ds.data[i]||0
      }));

      // Fill area
      if (ds.fill) {
        let d = `M${pts[0].x},${padT+plotH}`;
        pts.forEach(p => { d += ` L${p.x},${p.y}`; });
        d += ` L${pts[pts.length-1].x},${padT+plotH} Z`;
        svg.appendChild(g('path',{d,fill:ds.backgroundColor||'rgba(55,138,221,0.08)',stroke:'none'}));
      }

      // Line (smooth via cubic bezier)
      let d = `M${pts[0].x},${pts[0].y}`;
      for (let i=1; i<pts.length; i++) {
        const cp1x = pts[i-1].x + (pts[i].x-pts[i-1].x)*0.4;
        const cp2x = pts[i].x - (pts[i].x-pts[i-1].x)*0.4;
        d += ` C${cp1x},${pts[i-1].y} ${cp2x},${pts[i].y} ${pts[i].x},${pts[i].y}`;
      }
      svg.appendChild(g('path',{d,fill:'none',stroke:ds.borderColor||'#378ADD','stroke-width':2.5}));

      // Points + MoM arrows
      pts.forEach((p,i) => {
        svg.appendChild(g('circle',{cx:p.x,cy:p.y,r:4,fill:ds.borderColor||'#378ADD',stroke:'#fff','stroke-width':1.5}));

        // Arrow
        if (i > 0 && pts[i-1].val > 0) {
          const up = p.val >= pts[i-1].val;
          const arrowEl = g('text',{x:p.x,y:up?p.y-8:p.y+14,'font-size':'11','font-weight':'bold',
            fill:up?'#0F6E56':'#D85A30','text-anchor':'middle','font-family':'sans-serif'});
          arrowEl.textContent = up ? '↑' : '↓';
          svg.appendChild(arrowEl);
        }

        // Tooltip hover
        const hotspot = g('circle',{cx:p.x,cy:p.y,r:10,fill:'transparent'});
        hotspot.addEventListener('mousemove', e => {
          const box = wrap.getBoundingClientRect();
          tip.style.left = Math.min(e.clientX-box.left+10, W-120)+'px';
          tip.style.top = (e.clientY-box.top-40)+'px';
          tip.style.display='block';
          let html = `<b>${labels[i]}</b><br>${ds.label||''}: ${fmt(p.val)}`;
          if (i>0 && pts[i-1].val>0) {
            const delta = p.val - pts[i-1].val;
            const pct = ((delta/pts[i-1].val)*100).toFixed(0);
            html += `<br>${delta>=0?'↑ +':'↓ '}${fmt(Math.abs(delta))} (${delta>=0?'+':''}${pct}% MoM)`;
          }
          tip.innerHTML = html;
        });
        hotspot.addEventListener('mouseleave',()=>{tip.style.display='none';});
        svg.appendChild(hotspot);
      });
    });

    // X labels
    labels.forEach((lbl,i) => {
      const x = padL + i/(n-1)*plotW;
      const t = txt(x,padT+plotH+14,lbl,{'text-anchor':'end','font-size':'9','transform':`rotate(-35,${x},${padT+plotH+14})`});
      svg.appendChild(t);
    });

    // Legend
    datasets.forEach((ds,i) => {
      const lx = padL + i*110;
      svg.appendChild(g('line',{x1:lx,y1:H-6,x2:lx+18,y2:H-6,stroke:ds.borderColor||'#378ADD','stroke-width':2.5}));
      svg.appendChild(txt(lx+22,H-3,ds.label||'',{'fill':'#888780','font-size':'9'}));
    });

    this._charts[id]=true;
    wrap.appendChild(svg);
  }
};

// Compatibility shims to match old Chart.js API calls
function bar(id,labels,datasets,yFmt,extraOpts={}){
  MiniChart.bar(id,labels,datasets,{yFmt,horizontal:false,...extraOpts});
}
function barH(id,labels,datasets,yFmt){
  MiniChart.bar(id,labels,datasets,{yFmt,horizontal:true});
}
function dc(id){ MiniChart.destroy(id); }
let _ch={};

function fmt(v){if(!v||v===0)return'$0';return'$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v).toString())}
function fmtFull(v){return'$'+Math.round(v||0).toLocaleString()}
function pct(a,b){if(!b)return'—';const p=((a-b)/b*100).toFixed(0);return(p>0?'+':'')+p+'%'}
function mLabel(k){const[y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleString('en',{month:'short'})+' \''+(y.slice(2))}
function sortedUnion(...objs){return[...new Set(objs.flatMap(o=>Object.keys(o)))].sort()}
function line(id,labels,datasets){MiniChart.line(id,labels,datasets);}
function metricCards(cards){
  return '<div class="metric-cards">'+cards.map(c=>`
    <div class="metric-card${c.cls?' metric-card--'+c.cls:''}">
      <div class="metric-label">${c.l}</div>
      <div class="metric-value">${c.v}</div>
      ${c.s?`<div class="metric-sub">${c.s}</div>`:''}
    </div>`).join('')+'</div>';
}
function stageTbl(stage){
  if(!stage||!Object.keys(stage).length) return '<div class="note">No stage data</div>';
  const order=['10% - Identified','25% - Qualified','50% - Proposing','75% - Positive Feedback','90% - Verbal','99% - Procurement Process'];
  const rows=order.filter(s=>stage[s]).map(s=>`<tr><td>${s}</td><td style="text-align:right;font-weight:600">${stage[s]}</td></tr>`);
  return '<table style="width:100%;font-size:11px;border-collapse:collapse">'+rows.join('')+'</table>';

function goalsGetActual(g) {
  const keys26=['2026-01','2026-02','2026-03','2026-04'];
  if (g.metric==='pipe_2026_ytd') return keys26.reduce((s,k)=>s+(MD.pipe_created_rev.aff26[k]||0)+(MD.pipe_created_rev.cs26[k]||0),0);
  if (g.metric==='won_2026_ytd')  return keys26.reduce((s,k)=>s+(MD.won_rev.aff26[k]||0)+(MD.won_rev.cs26[k]||0),0);
  if (g.metric==='won_2026_deals')return keys26.reduce((s,k)=>s+(MD.won_count.aff26[k]||0)+(MD.won_count.cs26[k]||0),0);
  if (g.metric==='aff_2026_ytd') return keys26.reduce((s,k)=>s+(MD.pipe_created_rev.aff26[k]||0),0);
  if (g.metric==='cs_2026_ytd')  return keys26.reduce((s,k)=>s+(MD.pipe_created_rev.cs26[k]||0),0);
  if (g.metric==='contacts_ytd') return CONTACTS&&CONTACTS.monthly_26?Object.values(CONTACTS.monthly_26).reduce((a,b)=>a+b,0):243;
  return MD[g.metric]||0;
}

function goalsLoadTargets() {
  try {
    const saved = localStorage.getItem('improving_goals_2026_v3');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  const out = {};
  GOALS_DEFAULTS.forEach(g => { out[g.id] = g.target; });
  return out;
}

function goalsSaveTargets(targets) {
  try { localStorage.setItem('improving_goals_2026_v3', JSON.stringify(targets)); } catch(e) {}
}

function goalsRender() {
  const targets = goalsLoadTargets();
  const fmtV = (v, fmt) => {
    if (v===null||v===undefined) return '—';
    if (fmt==='#') return v.toLocaleString();
    return '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?Math.round(v/1e3)+'K':v);
  };
  const fmtT = (v, fmt) => {
    if (fmt==='#') return v.toLocaleString();
    return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?Math.round(v/1e3)+'K':String(v);
  };

  let html = '<div class="goals-grid">';
  GOALS_DEFAULTS.forEach(g => {
    const actual = goalsGetActual(g);
    const target = targets[g.id] || g.target;
    const pct = target>0 ? Math.min(Math.round(actual/target*100),100) : 0;
    const displayPct = target>0 ? Math.round(actual/target*100) : 0;
    const over = actual >= target;
    const fillColor = over ? '#059669' : pct>=70 ? '#378ADD' : pct>=40 ? '#F59E0B' : '#E5534B';
    const base25 = g.base2025;
    const base25Str = base25!==null&&base25!==undefined ? ' · 2025: '+fmtV(base25,g.fmt) : '';
    html += `
      <div class="goal-row">
        <div class="goal-row-header">
          <span class="goal-label">${g.label}</span>
          <span class="goal-values">
            <span class="goal-actual">${fmtV(actual,g.fmt)}</span>
            <span class="goal-sep">/</span>
            <input class="goal-target-input" id="${g.id}_input" type="text" value="${fmtT(target,g.fmt)}"
              onchange="goalsUpdateTarget('${g.id}','${g.fmt}',this.value)" title="Click to edit target"/>
          </span>
        </div>
        <div style="font-size:.65rem;color:#888780;margin-bottom:.2rem">${g.sub}${base25Str}</div>
        <div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        <div class="goal-pct">${displayPct}% of goal${over?' ✓':''}</div>
      </div>`;
  });
  html += '</div>';
  html += '<div class="goals-note" style="display:flex;justify-content:space-between;align-items:center"><span>💡 Click any target value to edit — targets auto-set to +20% over 2025. Color scale: green = on/over target · blue = 70%+ · amber = 40%+ · red = below 40%.</span><button onclick="goalsResetTargets()" style="font-size:.65rem;padding:3px 10px;border:1px solid #D3D1C7;border-radius:5px;background:#fff;cursor:pointer;color:#888780">Reset to defaults</button></div>';
  const el = document.getElementById('ov-goals-body');
  if (el) el.innerHTML = html;
}

function goalsResetTargets() {
  try { localStorage.removeItem('improving_goals_2026_v3'); } catch(e) {}
  goalsRender();
}

function goalsUpdateTarget(id, fmt, rawVal) {
  const targets = goalsLoadTargets();
  let v = rawVal.replace(/[$,MKmk]/g,'').trim();
  const mult = rawVal.match(/[Mm]$/) ? 1e6 : rawVal.match(/[Kk]$/) ? 1e3 : 1;
  v = parseFloat(v) * mult;
  if (!isNaN(v) && v > 0) {
    targets[id] = v;
    goalsSaveTargets(targets);
    goalsRender();
  }
}

      {label:'Registered', val:reg.rate, won:reg.won, total:reg.total, color:'#378ADD'},
      {label:'Non-registered', val:nonreg.rate, won:nonreg.won, total:nonreg.total, color:'#1D9E75'},

        <div style="font-size:11px;font-weight:600;color:#1a1a18;text-align:center">${b.label}</div>
        <div style="font-size:10px;color:#888780">${b.won}/${b.total} deals</div>

  if (el25) el25.innerHTML = barsHTML(d.y25, d.nonreg25);

  const finding = document.getElementById('cr-finding');

    }
  }
}

const TYPE_ICONS = { Event:'📍', Campaign:'📣', Ad:'🎯', Other:'📌' };
const PARTNER_ABBREV = {
  'Microsoft':'MSFT', 'Google':'GOOG', 'AWS':'AWS', 'Databricks':'DBX',
  'SAP':'SAP', 'Snowflake':'SFLK', 'Confluent':'CFLNT', 'Databricks/SAP':'DBX/SAP',
};
function partnerAbbrev(p) {
  for (const [k,v] of Object.entries(PARTNER_ABBREV)) {
    if (p.includes(k)) return v;
  }
  return p.substring(0,5);
}

function getPartnerColor(partner) {
  for (const [key, val] of Object.entries(PARTNER_COLORS)) {
    if (partner.includes(key)) return val;
  }
  return PARTNER_COLORS.default;
}

function renderMktCal() {
  const el = document.getElementById('tab-mktcal');

  // Count by type and partner
  const byType = {};
  const byPartner = {};
  MKT_ACTIVITIES.forEach(a => {
    byType[a.type] = (byType[a.type]||0) + 1;
    const pk = a.partner.split('/')[0];
    byPartner[pk] = (byPartner[pk]||0) + 1;
  });

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTH_STARTS = months.map((_,i) => `2026-${String(i+1).padStart(2,'0')}-01`);
  const MONTH_ENDS   = ['2026-01-31','2026-02-28','2026-03-31','2026-04-30','2026-05-31',
                        '2026-06-30','2026-07-31','2026-08-31','2026-09-30','2026-10-31','2026-11-30','2026-12-31'];

  // State
  let filterPartner = 'All';
  let filterType = 'All';
  let viewMode = 'gantt'; // 'gantt' or 'list'

  function getFiltered() {
    const s = window._mktCalState || {};
    const fp = s.filterPartner || 'All';
    const ft = s.filterType    || 'All';
    return MKT_ACTIVITIES.filter(a => {
      if (fp !== 'All' && !a.partner.includes(fp)) return false;
      if (ft !== 'All' && a.type !== ft) return false;
      return true;
    });
  }

  function renderGantt() {
    const acts = getFiltered();
    const yearStart = new Date('2026-01-01').getTime();
    const yearEnd   = new Date('2026-12-31').getTime();
    const yearSpan  = yearEnd - yearStart;

    let html = `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:700px;table-layout:fixed">
      <colgroup><col style="width:170px">${months.map(()=>'<col>').join('')}</colgroup>
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;font-size:11px;color:#888780;border-bottom:2px solid #D3D1C7;text-transform:uppercase;letter-spacing:.04em">Activity</th>
        ${months.map(m=>`<th style="text-align:center;padding:4px 2px;font-size:10px;color:#888780;border-bottom:2px solid #D3D1C7;font-weight:600">${m}</th>`).join('')}
      </tr></thead><tbody>`;

    acts.forEach((a, i) => {
      const c = getPartnerColor(a.partner);
      const icon = TYPE_ICONS[a.type] || '📌';
      const start = new Date(a.start).getTime();
      const end   = new Date(a.end).getTime() + 86400000 * 6; // extend to end of week

      html += `<tr style="border-bottom:1px solid #EEEDEA;${i%2===0?'':'background:#fafaf8'}">
        <td style="padding:5px 8px;font-size:11px;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px" title="${a.activity}">
          <span style="font-size:10px">${icon}</span> ${a.activity}
          ${a.enterprise ? `<div style="font-size:9px;color:#888780">${a.enterprise}</div>` : ''}
        </td>`;

      months.forEach((_, mi) => {
        const mStart = new Date(MONTH_STARTS[mi]).getTime();
        const mEnd   = new Date(MONTH_ENDS[mi]).getTime() + 86400000;
        const overlap = start < mEnd && end > mStart;
        if (overlap) {
          const isFirst = start >= mStart && start < mEnd;
          const isLast  = end   >= mStart && end   < mEnd + 86400000;
          const br = `border-radius:${isFirst?'6px':0} ${isLast?'6px':0} ${isLast?'6px':0} ${isFirst?'6px':0}`;
          const abbrev = partnerAbbrev(a.partner);
          html += `<td style="padding:3px 2px">
            <div title="${a.activity} · ${a.partner}" style="height:20px;background:${c.bg};border-top:1.5px solid ${c.border};border-bottom:1.5px solid ${c.border};${isFirst?'border-left:1.5px solid '+c.border+';':''}${isLast?'border-right:1.5px solid '+c.border+';':''};${br};display:flex;align-items:center;justify-content:center;font-size:9px;color:${c.text};font-weight:600;cursor:default;white-space:nowrap;overflow:hidden;padding:0 3px">
              ${abbrev}
            </div>
          </td>`;
        } else {
          html += `<td></td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    document.getElementById('mktcal-view').innerHTML = html;
  }

  function renderList() {
    const acts = getFiltered().sort((a,b) => a.start.localeCompare(b.start));
    const grouped = {};
    acts.forEach(a => {
      const m = a.start.slice(0,7);
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(a);
    });

    let html = '';
    Object.entries(grouped).sort().forEach(([month, items]) => {
      const d = new Date(month+'-01');
      const label = d.toLocaleString('en',{month:'long',year:'numeric'});
      html += `<div style="margin-bottom:1rem">
        <div style="font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #D3D1C7">${label}</div>
        <div style="display:flex;flex-direction:column;gap:6px">`;
      items.forEach(a => {
        const c = getPartnerColor(a.partner);
        const icon = TYPE_ICONS[a.type] || '📌';
        const isSingleDay = a.start === a.end;
        const dateStr = isSingleDay
          ? new Date(a.start).toLocaleDateString('en',{month:'short',day:'numeric'})
          : new Date(a.start).toLocaleDateString('en',{month:'short',day:'numeric'}) + ' – ' + new Date(a.end).toLocaleDateString('en',{month:'short',day:'numeric'});
        html += `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border-radius:8px;border:1px solid ${c.border};background:${c.bg}">
          <span style="font-size:16px;flex-shrink:0">${icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:${c.text}">${a.activity}</div>
            <div style="font-size:11px;color:#888780;margin-top:2px">${a.partner}${a.enterprise?' · '+a.enterprise:''} · ${dateStr}</div>
          </div>
          <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:white;border:1px solid ${c.border};color:${c.text};white-space:nowrap">${a.type}</span>
        </div>`;
      });
      html += `</div></div>`;
    });

    document.getElementById('mktcal-view').innerHTML = html;
  }

  function rerender() {
    const s = window._mktCalState || {};
    if ((s.viewMode||'gantt') === 'gantt') renderGantt();
    else renderList();
  }

  // Build the tab HTML
  const allPartners = [...new Set(MKT_ACTIVITIES.map(a => a.partner.split('/')[0]))].sort();
  const allTypes    = [...new Set(MKT_ACTIVITIES.map(a => a.type))].sort();

  el.innerHTML = `
  ${metricCards([
    {l:'Total activities',    v:MKT_ACTIVITIES.length, s:'Events + campaigns + ads'},
    {l:'Events',             v:MKT_ACTIVITIES.filter(a=>a.type==='Event').length,    s:'Conferences & activations'},
    {l:'Campaigns',          v:MKT_ACTIVITIES.filter(a=>a.type==='Campaign').length, s:'Demand generation'},
    {l:'Partners covered',   v:Object.keys(byPartner).length, s:'Across all activities'},
  ])}
  <div class="chart-full">
    <div class="chart-header" style="flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="chart-title" style="margin-bottom:0">2026 Partner Marketing Calendar</div>
        <a href="https://improving.sharepoint.com/sites/Sales/SitePages/Partner-Calendar.aspx?startedResponseCatch=true"
           target="_blank" rel="noopener"
           style="display:inline-flex;align-items:center;gap:5px;padding:4px 11px;background:#185FA5;color:#fff;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;white-space:nowrap">
          🔗 Open Partner Calendar
        </a>
        <a href="https://improving.sharepoint.com/:x:/r/sites/OfficeoftheChiefConsultingOfficer/_layouts/15/Doc.aspx?sourcedoc=%7B00558D1A-B931-40C1-979F-F58399C626A7%7D&file=Consolidated%20Marketing%20Budget.xlsx&action=default&mobileredirect=true"
           target="_blank" rel="noopener"
           style="display:inline-flex;align-items:center;gap:5px;padding:4px 11px;background:#1D9E75;color:#fff;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;white-space:nowrap">
          📊 Marketing Budget
        </a>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <div class="tog-row">
          <button class="tog on" id="cal-gantt" onclick="calView('gantt')">Gantt</button>
          <button class="tog" id="cal-list" onclick="calView('list')">List</button>
        </div>
        <select id="cal-partner" onchange="calFilter()" style="padding:3px 8px;border-radius:5px;border:1px solid #D3D1C7;font-size:11px;color:#888780;background:#fff">
          <option value="All">All partners</option>
          ${allPartners.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <select id="cal-type" onchange="calFilter()" style="padding:3px 8px;border-radius:5px;border:1px solid #D3D1C7;font-size:11px;color:#888780;background:#fff">
          <option value="All">All types</option>
          ${allTypes.map(t=>`<option value="${t}">${TYPE_ICONS[t]} ${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="legend" style="margin-top:8px">
      ${Object.entries(PARTNER_COLORS).filter(([k])=>k!=='default').map(([k,v])=>
        `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${v.bg};border:1.5px solid ${v.border}"></span>${k}</span>`
      ).join('')}
    </div>
    <div id="mktcal-view" style="margin-top:12px"></div>
  </div>`;

  // Initialise shared state BEFORE first render
  window._mktCalState = { filterPartner:'All', filterType:'All', viewMode:'gantt', rerender };

  rerender();
}

function calView(mode) {
  if (!window._mktCalState) return;
  window._mktCalState.viewMode = mode;
  const gBtn = document.getElementById('cal-gantt');
  const lBtn = document.getElementById('cal-list');
  if (gBtn) gBtn.className = 'tog'+(mode==='gantt'?' on':'');
  if (lBtn) lBtn.className = 'tog'+(mode==='list'?' on':'');
  window._mktCalState.rerender();
}

function calFilter() {
  if (!window._mktCalState) return;
  const pEl = document.getElementById('cal-partner');
  const tEl = document.getElementById('cal-type');
  window._mktCalState.filterPartner = pEl ? pEl.value : 'All';
  window._mktCalState.filterType    = tEl ? tEl.value : 'All';
  window._mktCalState.rerender();
}

function scoreColor(s) {
  if (s >= 50) return '#059669';
  if (s >= 30) return '#378ADD';
  if (s >= 15) return '#EF9F27';
  return '#D85A30';
}
function scoreBg(s) {
  if (s >= 50) return '#E1F5EE';
  if (s >= 30) return '#EEF5FF';
  if (s >= 15) return '#FFF8E6';
  return '#FAECE7';
}
function scoreTier(s) {
  if (s >= 50) return 'Elite';
  if (s >= 30) return 'Strong';
  if (s >= 15) return 'Developing';
  return 'Early';
}

function scorecardGauge(score, size=56) {
  const r = size/2 - 4;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(score/100, 1);
  const dash = circ * pct;
  const gap  = circ - dash;
  const c = scoreColor(score);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E8E7E3" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size < 50 ? 11 : 14}" font-weight="700" fill="${c}" font-family="sans-serif">${score}</text>
  </svg>`;
}

function metricBar(label, val, max, color, fmt='pct') {
  const pct = Math.min((val/max)*100, 100);
  const display = fmt==='$'
    ? (val>=1e6 ? '$'+(val/1e6).toFixed(1)+'M' : val>=1e3 ? '$'+Math.round(val/1e3)+'K' : '$'+Math.round(val))
    : fmt==='#' ? val : val.toFixed(1)+'%';
  return `<div style="margin-bottom:6px">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#888780;margin-bottom:2px">
      <span>${label}</span><span style="font-weight:600;color:#1a1a18">${display}</span>
    </div>
    <div style="background:#EEEDEA;border-radius:3px;height:5px">
      <div style="width:${pct.toFixed(1)}%;height:5px;background:${color};border-radius:3px"></div>
    </div>
  </div>`;
}

function renderScorecardTab(elId, data, title, subtitle, entityLabel) {
  const el = document.getElementById(elId);
  const topScore = data[0].score;
  const maxPipeRev = Math.max(...data.map(d=>d.pipe_rev));
  const maxWonRev  = Math.max(...data.map(d=>d.won_rev));
  const maxDR      = Math.max(...data.map(d=>d.dr_count));

  // Summary KPIs
  const total = data.length;
  const elite = data.filter(d=>d.score>=50).length;
  const strong = data.filter(d=>d.score>=30&&d.score<50).length;
  const developing = data.filter(d=>d.score>=15&&d.score<30).length;
  const early = data.filter(d=>d.score<15).length;

  // Store state before defining renderCards so closure reads from window
  window[`_sc_${elId}`] = { sortKey:'score', filterTier:'All', data, maxPipeRev, maxWonRev, maxDR };

  function getFiltered() {
    const st = window[`_sc_${elId}`];
    const activeData = st.data || data;
    return activeData
      .filter(d => st.filterTier==='All' || scoreTier(d.score)===st.filterTier)
      .sort((a,b) => b[st.sortKey] - a[st.sortKey]);
  }

  function renderCards() {
    const filtered = getFiltered();
    const st = window[`_sc_${elId}`];
    const mPR = st.maxPipeRev || maxPipeRev;
    const mWR = st.maxWonRev  || maxWonRev;
    const mDR = st.maxDR      || maxDR;
    document.getElementById(`${elId}-cards`).innerHTML = filtered.map(d => {
      const c = scoreColor(d.score);
      const bg = scoreBg(d.score);
      return `<div style="background:#fff;border:1px solid #D3D1C7;border-radius:12px;padding:14px 16px;border-top:3px solid ${c}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-size:13px;font-weight:700;color:#1a1a18">${d.name}</div>
            <div style="display:inline-block;margin-top:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:${bg};color:${c}">${scoreTier(d.score)}</div>
          </div>
          ${scorecardGauge(d.score, 60)}
        </div>
        <div style="border-top:1px solid #EEEDEA;padding-top:10px">
          ${metricBar('Wtd. Pipeline', d.pipe_rev, mPR, '#378ADD', '$')}
          ${metricBar('Won revenue', d.won_rev, mWR, '#059669', '$')}
          ${metricBar('Registrations', d.dr_count, mDR||1, '#EF9F27', '#')}
          ${metricBar('Close rate', d.close_rate, 100, '#7F77DD', 'pct')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid #EEEDEA">
          <div style="font-size:10px;color:#888780">Pipeline: <strong style="color:#1a1a18">${d.pipe_deals} deals</strong></div>
          <div style="font-size:10px;color:#888780">Won: <strong style="color:#1a1a18">${d.won_deals} deals</strong></div>
          <div style="font-size:10px;color:#888780">Score breakdown:</div>
          <div style="font-size:10px;color:#888780"></div>
          <div style="font-size:10px;color:#378ADD">Pipe: ${d.score_pipeline.toFixed(1)}/25</div>
          <div style="font-size:10px;color:#059669">Won: ${d.score_won.toFixed(1)}/40</div>
          <div style="font-size:10px;color:#EF9F27">DR: ${d.score_dr.toFixed(1)}/20</div>
          <div style="font-size:10px;color:#7F77DD">Close: ${d.score_close.toFixed(1)}/15</div>
        </div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `
  ${metricCards([
    {l:'Total '+entityLabel+'s',v:String(total),s:'All with partner activity'},
    {l:'Elite (50+)',v:String(elite),s:'Top performers',cls:'won'},
    {l:'Strong (30–49)',v:String(strong),s:'Solid engagement',cls:'pipeline'},
    {l:'Developing (15–29)',v:String(developing),s:'Building momentum'},
  ])}
  <div style="background:#EEF5FF;border:1px solid #D3D1C7;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:11px;color:#1A3A6A;line-height:1.6">
    <strong>Scoring methodology:</strong> Score out of 100 — Weighted Pipeline 25pts · Won Revenue 40pts · Deal Registrations 20pts · Close Rate 15pts · Pipeline is probability-weighted (e.g. 50% Proposing × revenue). All metrics normalized relative to top performer · YoY window: Apr 1 2025 – Mar 31 2026.
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem">
    <span style="font-size:11px;color:#888780;font-weight:600">SORT BY</span>
    <button class="tog on" id="${elId}-sort-score" onclick="scSort('${elId}','score')">Score</button>
    <button class="tog" id="${elId}-sort-won" onclick="scSort('${elId}','won_rev')">Won Revenue</button>
    <button class="tog" id="${elId}-sort-pipe" onclick="scSort('${elId}','pipe_rev')">Pipeline</button>
    <button class="tog" id="${elId}-sort-dr" onclick="scSort('${elId}','dr_count')">Registrations</button>
    <button class="tog" id="${elId}-sort-close" onclick="scSort('${elId}','close_rate')">Close Rate</button>
    <span style="font-size:11px;color:#888780;font-weight:600;margin-left:8px">FILTER</span>
    <button class="tog on" id="${elId}-tier-All" onclick="scFilter('${elId}','All')">All</button>
    <button class="tog" id="${elId}-tier-Elite" onclick="scFilter('${elId}','Elite')">Elite</button>
    <button class="tog" id="${elId}-tier-Strong" onclick="scFilter('${elId}','Strong')">Strong</button>
    <button class="tog" id="${elId}-tier-Developing" onclick="scFilter('${elId}','Developing')">Developing</button>
    <button class="tog" id="${elId}-tier-Early" onclick="scFilter('${elId}','Early')">Early</button>
  </div>
  <div id="${elId}-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem"></div>`;

  // Store renderCards into already-initialised state
  window[`_sc_${elId}`].renderCards = renderCards;
  renderCards();
}

function renderEntScorecard() {
  renderScorecardTab('tab-entscorecard', ENT_DATA, 'Enterprise Partner Scorecard', '2026 YTD performance across all partner channels', 'Enterprise');
  requestAnimationFrame(() => {
    const el = document.getElementById('tab-entscorecard');
    if (!el || document.getElementById('sc-ent-partner-filter')) return;
    const partners = Object.keys(ENT_BY_PARTNER).sort();
    const filterDiv = document.createElement('div');
    filterDiv.id = 'sc-ent-partner-filter';
    filterDiv.style.cssText = 'display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding:10px 14px;background:#F5F4F0;border-radius:8px;border:1px solid #D3D1C7';
    const allBtns = ['<span style="font-size:11px;color:#888780;font-weight:600;flex-shrink:0">PARTNER FILTER</span>',
      '<button class="tog on" id="sc-ep-All" onclick="scEntPartnerFilter(this.id.slice(6))">All Partners</button>'];
    window._scEntPartners = partners;
    partners.forEach((p,i) => {
      const safe = p.replace(/ /g,'_');
      allBtns.push('<button class="tog" id="sc-ep-' + safe + '" onclick="scEntPartnerFilter(window._scEntPartners[' + i + '])">' + p + '</button>');
    });
    filterDiv.innerHTML = allBtns.join('');
    const sortRow = el.querySelector('#tab-entscorecard-sort-score')?.closest('div[style*="display:flex"]');
    if (sortRow) sortRow.parentNode.insertBefore(filterDiv, sortRow);
    else el.insertBefore(filterDiv, el.children[2]);
  });
}

function scEntPartnerFilter(partner) {
  const state = window['_sc_tab-entscorecard'];
  if (!state) return;
  state.data = partner === 'All' ? ENT_DATA : (ENT_BY_PARTNER[partner] || []);
  state.maxPipeRev = Math.max(...state.data.map(d=>d.pipe_rev), 1);
  state.maxWonRev  = Math.max(...state.data.map(d=>d.won_rev), 1);
  state.maxDR      = Math.max(...state.data.map(d=>d.dr_count), 1);
  state.sortKey = 'score';
  state.filterTier = 'All';
  ['All','Elite','Strong','Developing','Early'].forEach(t => {
    const btn = document.getElementById('tab-entscorecard-tier-' + t);
    if (btn) btn.className = 'tog' + (t==='All' ? ' on' : '');
  });
  ['score','won','pipe','dr','close'].forEach(k => {
    const btn = document.getElementById('tab-entscorecard-sort-' + k);
    if (btn) btn.className = 'tog' + (k==='score' ? ' on' : '');
  });
  const allPartners = ['All', ...Object.keys(ENT_BY_PARTNER).sort()];
  allPartners.forEach(p => {
    const safe = p.replace(/ /g,'_');
    const btn = document.getElementById('sc-ep-' + (p==='All'?'All':safe));
    if (btn) btn.className = 'tog' + (p===partner ? ' on' : '');
  });
  state.renderCards();
}

function renderSellerScorecard() {
  window._sc_seller_type = window._sc_seller_type || 'All';
  const _scData = window._sc_seller_type === 'Affiliated' ? SELLER_DATA_AFF
                : window._sc_seller_type === 'Co-sell'    ? SELLER_DATA_CS
                : SELLER_DATA;
  const _scSubtitle = window._sc_seller_type === 'Affiliated' ? '2026 YTD · Affiliated channel only'
                    : window._sc_seller_type === 'Co-sell'    ? '2026 YTD · Co-sell channel only'
                    : '2026 YTD · All channels combined';
  renderScorecardTab('tab-sellerscorecard', _scData, 'Seller Partner Scorecard', _scSubtitle, 'Seller');
  // Add partner filter row after tab renders
  requestAnimationFrame(() => {
    const el = document.getElementById('tab-sellerscorecard');
    if (!el || document.getElementById('sc-partner-filter')) return;
    // Add Aff/CS type toggle FIRST
    const typeDiv = document.createElement('div');
    typeDiv.id = 'sc-type-filter';
    typeDiv.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:.75rem;padding:8px 14px;background:#EEF5FF;border-radius:8px;border:1px solid #93C5FD';
    typeDiv.innerHTML = '<span style="font-size:11px;color:#888780;font-weight:600;flex-shrink:0;margin-right:4px">CHANNEL</span>'
      + ['All','Affiliated','Co-sell'].map(t =>
          `<button class="tog${window._sc_seller_type===t?' on':''}" id="sc-t-${t}"
            onclick="window._sc_seller_type='${t}';document.getElementById('sc-type-filter').remove();document.getElementById('sc-partner-filter')?.remove();renderSellerScorecard();"
            style="font-size:.72rem">${t}</button>`
        ).join('');
    el.insertBefore(typeDiv, el.firstChild);
    const partners = Object.keys(SELLER_BY_PARTNER).sort();
    const filterDiv = document.createElement('div');
    filterDiv.id = 'sc-partner-filter';
    filterDiv.style.cssText = 'display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding:10px 14px;background:#F5F4F0;border-radius:8px;border:1px solid #D3D1C7';
    const allBtns = ['<span style="font-size:11px;color:#888780;font-weight:600;flex-shrink:0">PARTNER FILTER</span>',
        '<button class="tog on" id="sc-p-All" onclick="scPartnerFilter(this.id.slice(5))">All Partners</button>'];
      window._scPartners = partners;
      partners.forEach((p,i) => {
        const safe = p.replace(/ /g,'_');
        allBtns.push('<button class="tog" id="sc-p-' + safe + '" onclick="scPartnerFilter(window._scPartners[' + i + '])">' + p + '</button>');
      });
      filterDiv.innerHTML = allBtns.join('');
    // Insert before the sort/filter row
    const sortRow = el.querySelector('#tab-sellerscorecard-sort-score')?.closest('div[style*="display:flex"]');
    if (sortRow) sortRow.parentNode.insertBefore(filterDiv, sortRow);
    else el.insertBefore(filterDiv, el.children[2]);
  });
}

function scPartnerFilter(partner) {
  const state = window['_sc_tab-sellerscorecard'];
  if (!state) return;
  // Switch data source
  state.data = partner === 'All' ? SELLER_DATA : (SELLER_BY_PARTNER[partner] || []);
  // Recalculate maxes for the filtered data
  state.maxPipeRev = Math.max(...state.data.map(d=>d.pipe_rev), 1);
  state.maxWonRev  = Math.max(...state.data.map(d=>d.won_rev), 1);
  state.maxDR      = Math.max(...state.data.map(d=>d.dr_count), 1);
  state.sortKey = 'score';
  state.filterTier = 'All';
  // Reset tier buttons
  ['All','Elite','Strong','Developing','Early'].forEach(t => {
    const btn = document.getElementById('tab-sellerscorecard-tier-' + t);
    if (btn) btn.className = 'tog' + (t==='All' ? ' on' : '');
  });
  // Reset sort buttons
  ['score','won','pipe','dr','close'].forEach(k => {
    const btn = document.getElementById('tab-sellerscorecard-sort-' + k);
    if (btn) btn.className = 'tog' + (k==='score' ? ' on' : '');
  });
  // Update partner buttons
  const allPartners = ['All', ...Object.keys(SELLER_BY_PARTNER).sort()];
  allPartners.forEach(p => {
    const id = 'sc-p-' + p.replace(/ /g,'_');
    const btn = document.getElementById(id);
    if (btn) btn.className = 'tog' + (p===partner ? ' on' : '');
  });
  state.renderCards();
}

function scSort(elId, key) {
  const state = window[`_sc_${elId}`];
  state.sortKey = key;
  ['score','won_rev','pipe_rev','dr_count','close_rate'].forEach(k => {
    const btn = document.getElementById(`${elId}-sort-${k==='won_rev'?'won':k==='pipe_rev'?'pipe':k==='dr_count'?'dr':k==='close_rate'?'close':k}`);
    if (btn) btn.className = 'tog' + (k===key?' on':'');
  });
  state.renderCards();
}

function scFilter(elId, tier) {
  const state = window[`_sc_${elId}`];
  state.filterTier = tier;
  ['All','Elite','Strong','Developing','Early'].forEach(t => {
    const btn = document.getElementById(`${elId}-tier-${t}`);
    if (btn) btn.className = 'tog' + (t===tier?' on':'');
  });
  state.renderCards();
}

function deFilter(){
  const partner=document.getElementById('de-partner')?.value||'All';
  const ent=document.getElementById('de-ent')?.value||'All';
  const type=document.getElementById('de-type')?.value||'All';
  const status=document.getElementById('de-status')?.value||'All';
  const search=(document.getElementById('de-search')?.value||'').toLowerCase();
  let rows=window._deData.filter(d=>
    (partner==='All'||d.partner===partner)&&
    (ent==='All'||d.ent===ent)&&
    (type==='All'||d.type===type)&&
    (status==='All'||d.status===status)&&
    (!search||(d.acct+d.owner).toLowerCase().includes(search))
  );
  const col=window._deSortCol||'rev', dir=window._deSortDir||-1;
  rows.sort((a,b)=>{
    const av=a[col]||'',bv=b[col]||'';
    return typeof av==='number'?(av-bv)*dir:String(av).localeCompare(String(bv))*dir;
  });
  const totalRev=rows.reduce((s,d)=>s+d.rev,0);
  const sumEl=document.getElementById('de-summary');
  if(sumEl) sumEl.textContent=rows.length+' deals · $'+
    (totalRev>=1e6?(totalRev/1e6).toFixed(1)+'M':Math.round(totalRev/1e3)+'K')+' total revenue';
  const tbody=document.getElementById('de-body');
  if(!tbody)return;
  const colors={'Won':'#059669','Open':'#378ADD','Affiliated':'#1D6FAE','Co-sell':'#888780'};
  tbody.innerHTML=rows.slice(0,300).map(d=>'<tr>'
    +'<td>'+d.acct+'</td>'
    +'<td>'+d.ent+'</td>'
    +'<td>'+d.owner+'</td>'
    +'<td>'+d.partner+'</td>'
    +'<td><span style="color:'+( colors[d.type]||'#888')+'">'+d.type+'</span></td>'
    +'<td>'+d.prob+'</td>'
    +'<td style="text-align:right;font-weight:600">$'+(d.rev>=1e6?(d.rev/1e6).toFixed(1)+'M':d.rev>=1e3?Math.round(d.rev/1e3)+'K':d.rev)+'</td>'
    +'<td>'+d.close+'</td>'
    +'<td><span class="tier-badge" style="background:'+(d.status==='Won'?'#D1FAE5':'#DBEAFE')+';color:'+(d.status==='Won'?'#065F46':'#1E40AF')+'">'+d.status+'</span></td>'
    +'</tr>').join('');
}

function deSort(col){
  if(window._deSortCol===col) window._deSortDir*=-1;
  else{ window._deSortCol=col; window._deSortDir=-1; }
  deFilter();
}

    'Current bandwidth is the ceiling on growth. A second Partner Manager enables deeper coverage across Strategic and Growth tier partners, accelerates deal registration and co-sell activity, and provides redundancy as the program expands to additional GMS partners. Q3 target aligns with the Databricks and Google GMS launches.');
  var ask3 = makeAskCard('&#x2601;', 'Go All-In on Google &mdash; Convert to GMS &bull; Hire US Seller', '#1D9E75', '#E8F8F4',
    'Elevate Google Cloud to Global GTM Service status &bull; Hire a US-based dedicated Google seller',
    'Google Cloud pipeline is strong but lacks a dedicated driver. The GMS model creates the accountability loop that multiplies enterprise seller performance. A US-based hire anchors the relationship with Google\'s US partner team and opens the door to a co-sell motion that currently sits untapped.');



  // ── Data Insights — computed live from CRM data ──────────────────────
  var keys26 = ['2026-01','2026-02','2026-03','2026-04'];
  var keys25 = ['2025-01','2025-02','2025-03','2025-04','2025-05','2025-06','2025-07','2025-08','2025-09','2025-10','2025-11','2025-12'];

  // Avg deal size 2025 vs 2026
  var won25 = DEAL_DATA.filter(function(d){return d.status==='Won'&&d.close&&d.close.includes('2025');});
  var won26 = DEAL_DATA.filter(function(d){return d.status==='Won'&&d.close&&d.close.includes('2026');});
  var avg25 = won25.length ? Math.round(won25.reduce(function(s,d){return s+d.rev;},0)/won25.length) : 0;
  var avg26 = won26.length ? Math.round(won26.reduce(function(s,d){return s+d.rev;},0)/won26.length) : 0;
  var dealSizePct = avg25 ? Math.round((avg26-avg25)/avg25*100) : 0;

  // Pipeline concentration — top 3 partners
  var pipeByPartner = {};
  DEAL_DATA.filter(function(d){return d.status==='Open';}).forEach(function(d){
    pipeByPartner[d.partner] = (pipeByPartner[d.partner]||0)+d.rev;
  });
  var totalPipe = Object.values(pipeByPartner).reduce(function(a,b){return a+b;},0);
  var sortedPartners = Object.entries(pipeByPartner).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  var top3Pct = Math.round(sortedPartners.reduce(function(s,p){return s+p[1];},0)/totalPipe*100);

  // Seller concentration — top 5 sellers share of total pipeline
  var pipeByOwner = {};
  DEAL_DATA.filter(function(d){return d.status==='Open';}).forEach(function(d){
    pipeByOwner[d.owner] = (pipeByOwner[d.owner]||0)+d.rev;
  });
  var totalOwnerPipe = Object.values(pipeByOwner).reduce(function(a,b){return a+b;},0);
  var top5Pipe = Object.entries(pipeByOwner).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var top5Pct = Math.round(top5Pipe.reduce(function(s,p){return s+p[1];},0)/totalOwnerPipe*100);
  var topSeller = top5Pipe[0];

  // Pipeline stage health — early vs late stage deal count
  var earlyCount=0, lateCount=0, totalCount=0;
  ['aff25','aff26','cs25','cs26'].forEach(function(ch){
    Object.entries(MD.stage[ch]||{}).forEach(function(e){
      var stage=e[0], cnt=e[1];
      totalCount+=cnt;
      if(stage.includes('10%')||stage.includes('25%')) earlyCount+=cnt;
      if(stage.includes('75%')||stage.includes('90%')||stage.includes('99%')) lateCount+=cnt;
    });
  });
  var earlyPct = Math.round(earlyCount/totalCount*100);
  var latePct  = Math.round(lateCount/totalCount*100);

  // Microsoft revenue concentration in 2025 won
  var msftWon = won25.filter(function(d){return d.partner==='Microsoft';}).reduce(function(s,d){return s+d.rev;},0);
  var totalWon25 = won25.reduce(function(s,d){return s+d.rev;},0);
  var msftPct = Math.round(msftWon/totalWon25*100);

  // DR win rate 2025
  var dr25tot = Object.values(MD.dr_monthly_25||{}).reduce(function(a,b){return a+b;},0) || 138;
  var dr25won = 31; // from DR2 data

  function insightTile(icon, label, value, sub, color, flag) {
    // flag: 'good' | 'warn' | 'risk' | 'neutral'
    var flagColors = {good:'#059669',warn:'#F59E0B',risk:'#D85A30',neutral:'#378ADD'};
    var flagBg     = {good:'#E8F5EE',warn:'#FFF8E6',risk:'#FFF0EC',neutral:'#EEF5FF'};
    var fc = flagColors[flag]||'#378ADD';
    var fb = flagBg[flag]||'#EEF5FF';
    return '<div style="background:'+fb+';border-radius:10px;border:1px solid '+fc+';padding:14px 16px;display:flex;flex-direction:column;gap:4px">'
      + '<div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">'
      + '<span style="font-size:16px">'+icon+'</span>'
      + '<span style="font-size:10.5px;font-weight:700;color:'+fc+';text-transform:uppercase;letter-spacing:.04em">'+label+'</span>'
      + '</div>'
      + '<div style="font-size:22px;font-weight:700;color:'+fc+'">'+value+'</div>'
      + '<div style="font-size:11px;color:#555;line-height:1.45">'+sub+'</div>'
      + '</div>';
  }

  var insightsHtml = ''
    + insightTile('&#x1F4B0;','Avg Deal Size YoY',
        (dealSizePct>0?'+':'')+dealSizePct+'%',
        '$'+Math.round(avg25/1000)+'K (2025) &#8594; $'+Math.round(avg26/1000)+'K (2026 YTD) &mdash; deal size growing as GMS model matures',
        '', 'good')
    + insightTile('&#x1F3AF;','Pipeline Concentration',
        top3Pct+'%',
        sortedPartners.map(function(p){return p[0]+' $'+(p[1]/1e6).toFixed(1)+'M';}).join(' &bull; ')+' &mdash; top 3 partners own '+top3Pct+'% of open pipeline. Diversification is the long game.',
        '', 'warn')
    + insightTile('&#x1F464;','Seller Concentration',
        top5Pct+'% of pipeline',
        'Top 5 sellers own '+top5Pct+'% of all partner pipeline. '+topSeller[0]+' leads at $'+(topSeller[1]/1e6).toFixed(1)+'M. Depth below top 5 is the growth unlock.',
        '', 'warn')
    + insightTile('&#x23F3;','Pipeline Velocity',
        earlyPct+'% early-stage',
        earlyCount+' deals at 10–25% probability vs '+lateCount+' at 75%+. More partner rep touchpoints convert early-stage deals faster.',
        '', 'risk')
    + insightTile('&#x1F4CB;','DR Win Rate (2025)',
        '22.5%',
        dr25won+' won from '+dr25tot+' registrations in 2025. 2026 is early (2% so far, normal at this stage). Deal registrations are an underutilized lever.',
        '', 'neutral')
    + insightTile('&#x1F4C8;','MSFT Revenue Mix',
        msftPct+'% of 2025 won',
        'Microsoft drove '+msftPct+'% of 2025 won revenue. Healthy dependency, but Databricks and Google GMS expansion is the diversification strategy.',
        '', 'neutral');

  var insightsSection = ''
    + '<div style="background:#fff;border-radius:12px;border:1px solid #E5E3DC;overflow:hidden;margin-bottom:1.25rem">'
    + '<div style="padding:14px 20px;border-bottom:3px solid #4597D3;display:flex;align-items:center;gap:10px">'
    + '<span style="font-size:22px">&#x1F50D;</span>'
    + '<div style="font-size:15px;font-weight:700;color:#1a1a18">Data Insights — What the Numbers Are Saying</div>'
    + '<div style="margin-left:auto;font-size:11px;color:#888780;font-style:italic">Computed live from CRM data &bull; updates each monthly refresh</div>'
    + '</div>'
    + '<div style="padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">'
    + insightsHtml
    + '</div></div>';

  el.innerHTML = ''
    + '<div style="max-width:1200px">'

    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem">'
    + '<div>'
    + '<h2 style="font-size:20px;font-weight:700;color:#1a1a18;margin-bottom:4px">Partner Program &mdash; State of the Union</h2>'
    + '<div style="font-size:13px;color:#888780">Board review &bull; April 2026 &bull; Ehren Seim, VP Partner Ecosystem</div>'
    + '</div></div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">'
    + working + notworking
    + '</div>'

    + insightsSection

    + '<div style="background:#fff;border-radius:12px;border:1px solid #E5E3DC;overflow:hidden;margin-bottom:1.25rem">'
    + '<div style="padding:14px 20px;border-bottom:3px solid #185FA5;display:flex;align-items:center;gap:10px">'
    + '<span style="font-size:22px">&#x1F3AF;</span>'
    + '<div style="font-size:15px;font-weight:700;color:#1a1a18">The Ask</div>'
    + '<div style="margin-left:auto;font-size:11px;color:#888780;font-style:italic">Three investments to unlock the next level of partner-driven growth</div>'
    + '</div>'
    + '<div style="padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">'
    + ask1 + ask2 + ask3 + ask4
    + '</div></div>'

    + '<div style="background:#1a1a18;border-radius:12px;padding:20px 24px;display:flex;gap:24px;flex-wrap:wrap;align-items:center">'
    + '<div style="flex:1;min-width:260px">'
    + '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:6px">The pattern is clear</div>'
    + '<div style="font-size:12px;color:#B4B2A9;line-height:1.6">The GMS model works. Microsoft proves it &mdash; $66.9M in pipeline, $22.3M won in the rolling 12 months. The model creates competition and accountability with local enterprise sellers and drives pipeline growth by the numbers. Databricks and Google are the next two candidates. The constraint is not strategy &mdash; it is investment in the right people and structure.</div>'
    + '</div>'
    + '<div style="display:flex;gap:12px;flex-wrap:wrap">'
    + '<div style="text-align:center;background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px"><div style="font-size:22px;font-weight:700;color:#5BC2A7">$130.6M</div><div style="font-size:10px;color:#888780;margin-top:2px">Open pipeline today</div></div>'
    + '<div style="text-align:center;background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px"><div style="font-size:22px;font-weight:700;color:#F5BB41">$52.3M</div><div style="font-size:10px;color:#888780;margin-top:2px">Won revenue (YoY)</div></div>'
    + '<div style="text-align:center;background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px"><div style="font-size:22px;font-weight:700;color:#378ADD">1 &rarr; 3</div><div style="font-size:10px;color:#888780;margin-top:2px">GMS partners (proposed)</div></div>'
    + '</div></div>'

    + '</div>';
}


const TABS=['overview','affiliated','cosell','won','dealsreg2','dealexp','contacts','mktcal','eventplay','entscorecard','sellerscorecard','resourcing','closing'];
const rendered={};
function gotoTab(t){
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',TABS[i]===t));
  TABS.forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el){el.style.display=id===t?'block':'none';}
  });
  if(!rendered[t]){
    if(t==='overview')renderOverview();
    else if(t==='affiliated')renderPipeTab('affiliated');
    else if(t==='cosell')renderPipeTab('cosell');
    else if(t==='won')renderWonTab();
    else if(t==='dealexp')renderDealExp();
    else if(t==='dealsreg2')renderDR2Tab();
    else if(t==='contacts')renderContactsTab();
    else if(t==='mktcal')renderMktCal();
    else if(t==='eventplay')renderEventPlay();
    else if(t==='entscorecard')renderEntScorecard();
    else if(t==='sellerscorecard')renderSellerScorecard();
    else if(t==='resourcing')renderResourcing();
    else if(t==='closing')renderClosing();
    rendered[t]=true;
  }
}
document.addEventListener('DOMContentLoaded', function(){
  // Set initial display state
  TABS.forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el) el.style.display=id==='overview'?'block':'none';
  });
  requestAnimationFrame(()=>{ renderOverview(); rendered['overview']=true; });
});

</script>
