<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Pipeline Dashboard</title>
<script>
// ── Mini charting library (no dependencies) ───────────────────────────────
const MiniChart = {
  _charts: {},
  _fmt: v => !v ? '$0' : '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v)),
  _fmtCount: v => v + ' deals',

  destroy(id) {
    if (this._charts[id]) { this._charts[id] = null; }
    const el = document.getElementById(id);
    if (el) { el.innerHTML = ''; }
  },

  _tooltip(container, html) {
    let tip = container.querySelector('.mc-tip');
    if (!tip) {
      tip = document.createElement('div');
      tip.className = 'mc-tip';
      tip.style.cssText = 'position:absolute;background:rgba(26,26,24,.92);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;display:none;z-index:99;white-space:nowrap;line-height:1.6';
      container.appendChild(tip);
    }
    tip.innerHTML = html;
    return tip;
  },

  bar(id, labels, datasets, opts={}) {
    // opts.stacked = true for stacked bars
    this.destroy(id);
    const wrap = document.getElementById(id);
    if (!wrap) return;
    wrap.style.position = 'relative';

    const isHoriz = opts.horizontal || false;
    const isCount = opts.yFmt === 'count';
    const fmt = isCount ? v => v : this._fmt;

    // For stacked charts, max is the sum of all series per group; otherwise max single value
    const isStackedForMax = opts.stacked || false;
    let maxVal;
    if (isStackedForMax && !isHoriz) {
      const groupSums = (datasets[0]?.data||[]).map((_,gi) => datasets.reduce((s,ds)=>s+(ds.data[gi]||0),0));
      maxVal = Math.max(...groupSums, 1);
    } else {
      const allVals = datasets.flatMap(d => d.data.filter(v=>v>0));
      maxVal = Math.max(...allVals, 1);
    }
    const numGroups = labels.length;
    const numSeries = datasets.length;

    const styleH = parseInt((wrap.style.height||wrap.parentElement?.style?.height||'').replace('px',''))||0;
    const rect = wrap.getBoundingClientRect();
    const W = rect.width || wrap.clientWidth || wrap.parentElement?.clientWidth || 600;
    const H = rect.height || wrap.clientHeight || styleH || 220;
    const padL = isHoriz ? 90 : 48;
    const padR = 10;
    const padT = (opts.stacked||false) ? 30 : 20;
    const padB = isHoriz ? 30 : 52;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.style.overflow = 'visible';

    const g = (tag, attrs={}) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      return el;
    };
    const txt = (x,y,content,attrs={}) => {
      const el = g('text', {x,y,'font-size':'10','font-family':'sans-serif','fill':'#888780',...attrs});
      el.textContent = content;
      return el;
    };

    // Grid lines
    const numGridLines = 4;
    for (let i = 0; i <= numGridLines; i++) {
      const ratio = i / numGridLines;
      const valHoriz = maxVal * ratio;          // horiz: 0 on left, max on right
      const valVert  = maxVal * (1 - ratio);    // vert:  max on top, 0 on bottom
      if (isHoriz) {
        const x = padL + ratio * plotW;
        svg.appendChild(g('line',{x1:x,y1:padT,x2:x,y2:padT+plotH,stroke:'#E8E7E3','stroke-width':0.5}));
        svg.appendChild(txt(x, padT+plotH+12, fmt(valHoriz), {'text-anchor':'middle'}));
      } else {
        const y = padT + ratio * plotH;
        svg.appendChild(g('line',{x1:padL,y1:y,x2:padL+plotW,y2:y,stroke:'#E8E7E3','stroke-width':0.5}));
        svg.appendChild(txt(padL-4, y+3, fmt(valVert), {'text-anchor':'end'}));
      }
    }

    // Bars
    const isStacked = opts.stacked || false;
    const groupW = isHoriz ? plotH/numGroups : plotW/numGroups;
    const barW = isStacked ? Math.max(4, groupW * 0.7) : Math.max(2, (groupW * 0.8) / numSeries);
    const barGap = isStacked ? groupW * 0.15 : groupW * 0.1;
    const tip = this._tooltip(wrap, '');

    // For stacked: track cumulative heights per group
    const stackBase = new Array(labels.length).fill(0);

    datasets.forEach((ds, si) => {
      ds.data.forEach((val, gi) => {
        if (!val) return;
        const ratio = val / maxVal;
        let x, y, bw, bh;
        if (isHoriz) {
          bw = ratio * plotW;
          bh = Math.max(2, barW - 1);
          x = padL + (isStacked ? stackBase[gi] * plotW : 0);
          y = padT + gi * groupW + barGap + (isStacked ? 0 : si * barW);
        } else {
          bw = Math.max(3, barW - 1);
          bh = ratio * plotH;
          x = padL + gi * groupW + barGap + (isStacked ? 0 : si * barW);
          y = padT + plotH - bh - (isStacked ? stackBase[gi] * plotH : 0);
        }
        if (isStacked) stackBase[gi] += ratio;
        const rect = g('rect',{x,y,width:bw,height:bh,fill:ds.backgroundColor||'#378ADD',rx:si===0&&isStacked?'0 0 2 2':2});
        rect.addEventListener('mousemove', e => {
          const box = wrap.getBoundingClientRect();
          tip.style.left = (e.clientX - box.left + 10) + 'px';
          tip.style.top = (e.clientY - box.top - 30) + 'px';
          tip.style.display = 'block';
          tip.innerHTML = `<b>${labels[gi]}</b><br>${ds.label||''}: ${fmt(val)}`;
        });
        rect.addEventListener('mouseleave', () => { tip.style.display='none'; });
        svg.appendChild(rect);
      });
    });

    // Labels
    labels.forEach((lbl, gi) => {
      const shortLbl = lbl.length > 8 ? lbl.slice(0,7)+'…' : lbl;
      if (isHoriz) {
        const y = padT + gi * groupW + groupW/2 + 4;
        svg.appendChild(txt(padL-4, y, shortLbl, {'text-anchor':'end','font-size':'10'}));
      } else {
        const x = padL + gi * groupW + groupW/2;
        // Rotated label
        const t = txt(x, padT+plotH+14, lbl, {'text-anchor':'end','font-size':'9','transform':`rotate(-35,${x},${padT+plotH+14})`});
        svg.appendChild(t);
      }
    });

    // Legend
    if (datasets.length > 1) {
      datasets.forEach((ds, i) => {
        const lx = padL + i * 90;
        const ly = H - 6;
        svg.appendChild(g('rect',{x:lx,y:ly-7,width:10,height:8,fill:ds.backgroundColor||'#378ADD',rx:1}));
        svg.appendChild(txt(lx+13, ly, ds.label||'', {'fill':'#888780','font-size':'9'}));
      });
    }

    this._charts[id] = true;
    wrap.appendChild(svg);
  },

  line(id, labels, datasets) {
    this.destroy(id);
    const wrap = document.getElementById(id);
    if (!wrap) return;
    wrap.style.position = 'relative';

    const allVals = datasets.flatMap(d => d.data.filter(v=>v>0));
    const maxVal = Math.max(...allVals, 1);
    const styleH = parseInt((wrap.style.height||wrap.parentElement?.style?.height||'').replace('px',''))||0;
    const rect = wrap.getBoundingClientRect();
    const W = rect.width || wrap.clientWidth || wrap.parentElement?.clientWidth || 700;
    const H = rect.height || wrap.clientHeight || styleH || 260;
    const padL = 55, padR = 20, padT = 24, padB = 55;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;
    const n = labels.length;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','100%');
    svg.setAttribute('height',H);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

    const g = (tag, attrs={}) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      return el;
    };
    const txt = (x,y,content,attrs={}) => {
      const el = g('text',{x,y,'font-size':'10','font-family':'sans-serif','fill':'#888780',...attrs});
      el.textContent=content; return el;
    };
    const fmt = this._fmt;

    // Grid
    for (let i=0; i<=4; i++) {
      const ratio = i/4;
      const val = maxVal*(1-ratio);
      const y = padT + ratio*plotH;
      svg.appendChild(g('line',{x1:padL,y1:y,x2:padL+plotW,y2:y,stroke:'#E8E7E3','stroke-width':0.5}));
      svg.appendChild(txt(padL-4,y+3,fmt(val),{'text-anchor':'end'}));
    }

    const tip = this._tooltip(wrap,'');

    datasets.forEach(ds => {
      const pts = labels.map((lbl,i) => ({
        x: padL + i/(n-1)*plotW,
        y: padT + (1 - (ds.data[i]||0)/maxVal)*plotH,
        val: ds.data[i]||0
      }));

      // Fill area
      if (ds.fill) {
        let d = `M${pts[0].x},${padT+plotH}`;
        pts.forEach(p => { d += ` L${p.x},${p.y}`; });
        d += ` L${pts[pts.length-1].x},${padT+plotH} Z`;
        svg.appendChild(g('path',{d,fill:ds.backgroundColor||'rgba(55,138,221,0.08)',stroke:'none'}));
      }

      // Line (smooth via cubic bezier)
      let d = `M${pts[0].x},${pts[0].y}`;
      for (let i=1; i<pts.length; i++) {
        const cp1x = pts[i-1].x + (pts[i].x-pts[i-1].x)*0.4;
        const cp2x = pts[i].x - (pts[i].x-pts[i-1].x)*0.4;
        d += ` C${cp1x},${pts[i-1].y} ${cp2x},${pts[i].y} ${pts[i].x},${pts[i].y}`;
      }
      svg.appendChild(g('path',{d,fill:'none',stroke:ds.borderColor||'#378ADD','stroke-width':2.5}));

      // Points + MoM arrows
      pts.forEach((p,i) => {
        svg.appendChild(g('circle',{cx:p.x,cy:p.y,r:4,fill:ds.borderColor||'#378ADD',stroke:'#fff','stroke-width':1.5}));

        // Arrow
        if (i > 0 && pts[i-1].val > 0) {
          const up = p.val >= pts[i-1].val;
          const arrowEl = g('text',{x:p.x,y:up?p.y-8:p.y+14,'font-size':'11','font-weight':'bold',
            fill:up?'#0F6E56':'#D85A30','text-anchor':'middle','font-family':'sans-serif'});
          arrowEl.textContent = up ? '↑' : '↓';
          svg.appendChild(arrowEl);
        }

        // Tooltip hover
        const hotspot = g('circle',{cx:p.x,cy:p.y,r:10,fill:'transparent'});
        hotspot.addEventListener('mousemove', e => {
          const box = wrap.getBoundingClientRect();
          tip.style.left = Math.min(e.clientX-box.left+10, W-120)+'px';
          tip.style.top = (e.clientY-box.top-40)+'px';
          tip.style.display='block';
          let html = `<b>${labels[i]}</b><br>${ds.label||''}: ${fmt(p.val)}`;
          if (i>0 && pts[i-1].val>0) {
            const delta = p.val - pts[i-1].val;
            const pct = ((delta/pts[i-1].val)*100).toFixed(0);
            html += `<br>${delta>=0?'↑ +':'↓ '}${fmt(Math.abs(delta))} (${delta>=0?'+':''}${pct}% MoM)`;
          }
          tip.innerHTML = html;
        });
        hotspot.addEventListener('mouseleave',()=>{tip.style.display='none';});
        svg.appendChild(hotspot);
      });
    });

    // X labels
    labels.forEach((lbl,i) => {
      const x = padL + i/(n-1)*plotW;
      const t = txt(x,padT+plotH+14,lbl,{'text-anchor':'end','font-size':'9','transform':`rotate(-35,${x},${padT+plotH+14})`});
      svg.appendChild(t);
    });

    // Legend
    datasets.forEach((ds,i) => {
      const lx = padL + i*110;
      svg.appendChild(g('line',{x1:lx,y1:H-6,x2:lx+18,y2:H-6,stroke:ds.borderColor||'#378ADD','stroke-width':2.5}));
      svg.appendChild(txt(lx+22,H-3,ds.label||'',{'fill':'#888780','font-size':'9'}));
    });

    this._charts[id]=true;
    wrap.appendChild(svg);
  }
};

// Compatibility shims to match old Chart.js API calls
function bar(id,labels,datasets,yFmt,extraOpts={}){
  MiniChart.bar(id,labels,datasets,{yFmt,horizontal:false,...extraOpts});
}
function barH(id,labels,datasets,yFmt){
  MiniChart.bar(id,labels,datasets,{yFmt,horizontal:true});
}
function dc(id){ MiniChart.destroy(id); }
let _ch={};
</script>

<script>
function fmt(v){if(!v||v===0)return'$0';return'$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v).toString())}
function fmtFull(v){return'$'+Math.round(v||0).toLocaleString()}
function pct(a,b){if(!b)return'—';const p=((a-b)/b*100).toFixed(0);return(p>0?'+':'')+p+'%'}
function mLabel(k){const[y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleString('en',{month:'short'})+' \''+(y.slice(2))}
function sortedUnion(...objs){return[...new Set(objs.flatMap(o=>Object.keys(o)))].sort()}

    cs26:{'2026-01':2080090,'2026-02':2105592,'2026-03':3558945},
    cs25:{'2025-01':550000,'2025-02':1037535,'2025-03':459713,'2025-04':700000,'2025-05':9412234,'2025-06':363940,'2025-07':969387,'2025-08':686016,'2025-09':4180047,'2025-10':3686406,'2025-11':4910590,'2025-12':1164847}},

function metricCards(cards){
  return'<div class="metrics">'+cards.map(c=>`<div class="metric"><div class="metric-label">${c.l}</div><div class="metric-value${c.cls?' '+c.cls:''}">${c.v}</div>${c.s?`<div class="metric-sub">${c.s}</div>`:''}</div>`).join('')+'</div>';
}
function stageTbl(d){
  const order=['Identified','Qualified','Proposing','Pos. Feedback','Verbal','Procurement'];
  const rows=order.filter(s=>d[s]&&d[s].n>0);
  let tr=0,tw=0,tn=0,html='<table class="st-table"><thead><tr><th>Stage</th><th class="num">Deals</th><th class="num">Raw</th><th class="num">Weighted</th></tr></thead><tbody>';
  rows.forEach(s=>{const x=d[s];tr+=x.raw;tw+=x.wtd;tn+=x.n;html+=`<tr><td>${s}</td><td class="num">${x.n}</td><td class="num">${fmtFull(x.raw)}</td><td class="num" style="color:#185FA5;font-weight:600">${fmtFull(x.wtd)}</td></tr>`;});
  return html+`<tr class="ft"><td>Total</td><td class="num">${tn}</td><td class="num">${fmtFull(tr)}</td><td class="num" style="color:#185FA5">${fmtFull(tw)}</td></tr></tbody></table>`;
}

function buildTrendChart(mode) {
  const src = window._trendSources[mode];
  // Jan–Dec labels, merge 2025 and 2026 by month number
  const MON_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function mByIdx(obj, yr) {
    return MON_LABELS.map((_,i) => obj[`${yr}-${String(i+1).padStart(2,'0')}`] || 0);
  }
  const aff25 = mByIdx(src.aff25, '2025');
  const cs25  = mByIdx(src.cs25,  '2025');
  const aff26 = mByIdx(src.aff26, '2026');
  const cs26  = mByIdx(src.cs26,  '2026');

  const noteEl = document.getElementById('ov-tr-note');
  if (noteEl) noteEl.textContent = src.note;

  dc('ov-trend');
  MiniChart.line('ov-trend', MON_LABELS, [
    { label:'Affiliated 2025', data:aff25, borderColor:'#93C5FD', backgroundColor:'rgba(147,197,253,0.12)', fill:true },
    { label:'Co-sell 2025',    data:cs25,  borderColor:'#1D6FAE', backgroundColor:'rgba(29,111,174,0.08)',  fill:true },

    { label:'Co-sell 2026',    data:cs26,  borderColor:'#059669', backgroundColor:'rgba(5,150,105,0.08)',   fill:true },
  ]);
}

function togOvTrend(mode) {
  ['pip','cls','won'].forEach(id => {
    const el = document.getElementById('ov-tr-'+id);
    if (el) el.className = 'tog';
  });
  const map = { pipeline:'pip', close:'cls', won:'won' };
  const btn = document.getElementById('ov-tr-'+map[mode]);
  if (btn) btn.className = 'tog on';
  buildTrendChart(mode);
}
function togWon(mode){
  const wk=window._wk;
  const d=mode==='rev'?MD.won_rev:MD.won_count;
  const ch=_ch['won-monthly'];
  ch.data.datasets[0].data=wk.map(k=>d.aff25[k]||0);
  ch.data.datasets[1].data=wk.map(k=>d.aff26[k]||0);
  ch.data.datasets[2].data=wk.map(k=>d.cs25[k]||0);

  ch.update();
  document.getElementById('won-r').className='tog'+(mode==='rev'?' on':'');
  document.getElementById('won-c').className='tog'+(mode==='count'?' on':'');
}

function renderDR2Tab() {

  const allPartners = [...new Set([...partners26,...partners25])];

  // Build heatmap HTML helper
  function heatCell(val, max) {
    if (!val) return '<td style="background:#fafaf8;color:#D3D1C7;text-align:center;padding:6px 8px;border:1px solid #EEEDEA">—</td>';
    const intensity = Math.round((val / max) * 100);
    const bg = `rgba(55,138,221,${0.08 + intensity/100*0.72})`;
    const color = intensity > 55 ? '#fff' : '#1a1a18';
    return `<td style="background:${bg};color:${color};text-align:center;padding:6px 8px;font-weight:600;font-size:13px;border:1px solid #EEEDEA">${val}</td>`;
  }

  // Max value across all cells for colour scaling
  const allVals26 = partners26.flatMap(p => months26.map(m => DR2.reg_pm_26[p][m]||0));
  const allVals25 = partners25.flatMap(p => months25.map(m => DR2.reg_pm_25[p][m]||0));
  const max26 = Math.max(...allVals26);
  const max25 = Math.max(...allVals25);

  function heatTable(partners, months, data, maxVal, year) {
    const totals = months.map(m => partners.reduce((s,p)=>s+(data[p]?.[m]||0),0));
    let html = `<table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;border-bottom:2px solid #D3D1C7;color:#888780;font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap">Partner</th>
        ${months.map(m=>`<th style="text-align:center;padding:6px 8px;border-bottom:2px solid #D3D1C7;color:#888780;font-size:11px;white-space:nowrap">${mLabel(m)}</th>`).join('')}
        <th style="text-align:center;padding:6px 8px;border-bottom:2px solid #D3D1C7;color:#888780;font-size:11px">Total</th>
      </tr></thead><tbody>`;
    const sorted = [...partners].sort((a,b)=>{
      const ta=months.reduce((s,m)=>s+(data[a]?.[m]||0),0);
      const tb=months.reduce((s,m)=>s+(data[b]?.[m]||0),0);
      return tb-ta;
    });
    sorted.forEach(p => {
      const rowTotal = months.reduce((s,m)=>s+(data[p]?.[m]||0),0);
      if (!rowTotal) return;
      html += `<tr><td style="padding:6px 8px;border:1px solid #EEEDEA;font-weight:500;white-space:nowrap">${p}</td>
        ${months.map(m=>heatCell(data[p]?.[m]||0, maxVal)).join('')}
        <td style="text-align:center;padding:6px 8px;border:1px solid #EEEDEA;font-weight:700;color:#185FA5">${rowTotal}</td></tr>`;
    });
    // Totals row

function renderCloseRateBars(mode) {
  const d = CLOSE_RATES[mode];
  const maxRate = 58.4;

  function barsHTML(reg, nonreg) {
    return [
      {label:'Registered', val:reg.rate, won:reg.won, total:reg.total, color:'#378ADD'},
      {label:'Non-registered', val:nonreg.rate, won:nonreg.won, total:nonreg.total, color:'#1D9E75'},
    ].map(b => `
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
        <div style="font-size:13px;font-weight:700;color:${b.color}">${b.val}%</div>
        <div style="width:100%;background:${b.color};border-radius:4px 4px 0 0;height:${Math.max(4,Math.round(b.val/maxRate*120))}px"></div>
        <div style="font-size:11px;font-weight:600;color:#1a1a18;text-align:center">${b.label}</div>
        <div style="font-size:10px;color:#888780">${b.won}/${b.total} deals</div>
      </div>`).join('');
  }

  const el26 = document.getElementById('cr-bars-26');
  const el25 = document.getElementById('cr-bars-25');
  if (el26) el26.innerHTML = barsHTML(d.y26, d.nonreg26);
  if (el25) el25.innerHTML = barsHTML(d.y25, d.nonreg25);

  const finding = document.getElementById('cr-finding');
  if (finding) {
    if (mode === 'all') {
      finding.innerHTML = '<strong>Key finding:</strong> Registered deals close at a <em>lower</em> rate than non-registered pipeline in both years. The 2026 rate (1.1%) is heavily suppressed by 65 unassigned-partner deals — switch to "Named partners only" for a more accurate view.';
    } else {
      finding.innerHTML = '<strong>Key finding (named partners only):</strong> With unassigned deals excluded, 2026 registered close rate rises to <strong>3.3%</strong> (1/30) and 2025 to <strong>12.5%</strong> (15/120). Non-registered pipeline still closes at a much higher rate (37.1% and 58.4%), suggesting registration alone does not drive deal velocity.';
    }
  }
}

function togCloseRate(mode) {
  document.getElementById('cr-all-btn').className = 'tog' + (mode==='all' ? ' on' : '');

  document.getElementById('cr-note-named').style.display = mode==='named' ? '' : 'none';
  renderCloseRateBars(mode);
}

  const MONTH_STARTS = months.map((_,i) => `2026-${String(i+1).padStart(2,'0')}-01`);
  const MONTH_ENDS   = ['2026-01-31','2026-02-28','2026-03-31','2026-04-30','2026-05-31',
                        '2026-06-30','2026-07-31','2026-08-31','2026-09-30','2026-10-31','2026-11-30','2026-12-31'];

  // State
  let filterPartner = 'All';
  let filterType = 'All';
  let viewMode = 'gantt'; // 'gantt' or 'list'

  function getFiltered() {
    const s = window._mktCalState || {};
    const fp = s.filterPartner || 'All';
    const ft = s.filterType    || 'All';
    return MKT_ACTIVITIES.filter(a => {
      if (fp !== 'All' && !a.partner.includes(fp)) return false;
      if (ft !== 'All' && a.type !== ft) return false;
      return true;
    });
  }

  function renderGantt() {
    const acts = getFiltered();
    const yearStart = new Date('2026-01-01').getTime();
    const yearEnd   = new Date('2026-12-31').getTime();
    const yearSpan  = yearEnd - yearStart;

    let html = `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:700px;table-layout:fixed">
      <colgroup><col style="width:170px">${months.map(()=>'<col>').join('')}</colgroup>
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;font-size:11px;color:#888780;border-bottom:2px solid #D3D1C7;text-transform:uppercase;letter-spacing:.04em">Activity</th>
        ${months.map(m=>`<th style="text-align:center;padding:4px 2px;font-size:10px;color:#888780;border-bottom:2px solid #D3D1C7;font-weight:600">${m}</th>`).join('')}
      </tr></thead><tbody>`;

    acts.forEach((a, i) => {
      const c = getPartnerColor(a.partner);
      const icon = TYPE_ICONS[a.type] || '📌';
      const start = new Date(a.start).getTime();
      const end   = new Date(a.end).getTime() + 86400000 * 6; // extend to end of week

      html += `<tr style="border-bottom:1px solid #EEEDEA;${i%2===0?'':'background:#fafaf8'}">
        <td style="padding:5px 8px;font-size:11px;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px" title="${a.activity}">
          <span style="font-size:10px">${icon}</span> ${a.activity}
          ${a.enterprise ? `<div style="font-size:9px;color:#888780">${a.enterprise}</div>` : ''}
        </td>`;

      months.forEach((_, mi) => {
        const mStart = new Date(MONTH_STARTS[mi]).getTime();
        const mEnd   = new Date(MONTH_ENDS[mi]).getTime() + 86400000;
        const overlap = start < mEnd && end > mStart;
        if (overlap) {
          const isFirst = start >= mStart && start < mEnd;
          const isLast  = end   >= mStart && end   < mEnd + 86400000;
          const br = `border-radius:${isFirst?'6px':0} ${isLast?'6px':0} ${isLast?'6px':0} ${isFirst?'6px':0}`;
          const abbrev = partnerAbbrev(a.partner);
          html += `<td style="padding:3px 2px">
            <div title="${a.activity} · ${a.partner}" style="height:20px;background:${c.bg};border-top:1.5px solid ${c.border};border-bottom:1.5px solid ${c.border};${isFirst?'border-left:1.5px solid '+c.border+';':''}${isLast?'border-right:1.5px solid '+c.border+';':''};${br};display:flex;align-items:center;justify-content:center;font-size:9px;color:${c.text};font-weight:600;cursor:default;white-space:nowrap;overflow:hidden;padding:0 3px">
              ${abbrev}
            </div>
          </td>`;
        } else {
          html += `<td></td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    document.getElementById('mktcal-view').innerHTML = html;
  }

  function renderList() {
    const acts = getFiltered().sort((a,b) => a.start.localeCompare(b.start));
    const grouped = {};
    acts.forEach(a => {
      const m = a.start.slice(0,7);
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(a);
    });

    let html = '';
    Object.entries(grouped).sort().forEach(([month, items]) => {
      const d = new Date(month+'-01');
      const label = d.toLocaleString('en',{month:'long',year:'numeric'});
      html += `<div style="margin-bottom:1rem">
        <div style="font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #D3D1C7">${label}</div>
        <div style="display:flex;flex-direction:column;gap:6px">`;
      items.forEach(a => {
        const c = getPartnerColor(a.partner);
        const icon = TYPE_ICONS[a.type] || '📌';
        const isSingleDay = a.start === a.end;
        const dateStr = isSingleDay
          ? new Date(a.start).toLocaleDateString('en',{month:'short',day:'numeric'})
          : new Date(a.start).toLocaleDateString('en',{month:'short',day:'numeric'}) + ' – ' + new Date(a.end).toLocaleDateString('en',{month:'short',day:'numeric'});
        html += `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border-radius:8px;border:1px solid ${c.border};background:${c.bg}">
          <span style="font-size:16px;flex-shrink:0">${icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:${c.text}">${a.activity}</div>
            <div style="font-size:11px;color:#888780;margin-top:2px">${a.partner}${a.enterprise?' · '+a.enterprise:''} · ${dateStr}</div>
          </div>
          <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:white;border:1px solid ${c.border};color:${c.text};white-space:nowrap">${a.type}</span>
        </div>`;
      });
      html += `</div></div>`;
    });

    document.getElementById('mktcal-view').innerHTML = html;
  }

  function rerender() {
    const s = window._mktCalState || {};
    if ((s.viewMode||'gantt') === 'gantt') renderGantt();
    else renderList();
  }

  // Build the tab HTML
  const allPartners = [...new Set(MKT_ACTIVITIES.map(a => a.partner.split('/')[0]))].sort();
  const allTypes    = [...new Set(MKT_ACTIVITIES.map(a => a.type))].sort();

  el.innerHTML = `
  ${metricCards([
    {l:'Total activities',    v:MKT_ACTIVITIES.length, s:'Events + campaigns + ads'},
    {l:'Events',             v:MKT_ACTIVITIES.filter(a=>a.type==='Event').length,    s:'Conferences & activations'},
    {l:'Campaigns',          v:MKT_ACTIVITIES.filter(a=>a.type==='Campaign').length, s:'Demand generation'},
    {l:'Partners covered',   v:Object.keys(byPartner).length, s:'Across all activities'},
  ])}
  <div class="chart-full">
    <div class="chart-header" style="flex-wrap:wrap;gap:8px">
      <div class="chart-title" style="margin-bottom:0">2026 Partner Marketing Calendar</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <div class="tog-row">
          <button class="tog on" id="cal-gantt" onclick="calView('gantt')">Gantt</button>
          <button class="tog" id="cal-list" onclick="calView('list')">List</button>
        </div>
        <select id="cal-partner" onchange="calFilter()" style="padding:3px 8px;border-radius:5px;border:1px solid #D3D1C7;font-size:11px;color:#888780;background:#fff">
          <option value="All">All partners</option>
          ${allPartners.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <select id="cal-type" onchange="calFilter()" style="padding:3px 8px;border-radius:5px;border:1px solid #D3D1C7;font-size:11px;color:#888780;background:#fff">
          <option value="All">All types</option>
          ${allTypes.map(t=>`<option value="${t}">${TYPE_ICONS[t]} ${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="legend" style="margin-top:8px">
      ${Object.entries(PARTNER_COLORS).filter(([k])=>k!=='default').map(([k,v])=>
        `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${v.bg};border:1.5px solid ${v.border}"></span>${k}</span>`
      ).join('')}
    </div>
    <div id="mktcal-view" style="margin-top:12px"></div>
  </div>`;

  // Initialise shared state BEFORE first render
  window._mktCalState = { filterPartner:'All', filterType:'All', viewMode:'gantt', rerender };

  rerender();
}

function calView(mode) {
  if (!window._mktCalState) return;
  window._mktCalState.viewMode = mode;
  const gBtn = document.getElementById('cal-gantt');
  const lBtn = document.getElementById('cal-list');
  if (gBtn) gBtn.className = 'tog'+(mode==='gantt'?' on':'');
  if (lBtn) lBtn.className = 'tog'+(mode==='list'?' on':'');
  window._mktCalState.rerender();
}

function calFilter() {
  if (!window._mktCalState) return;
  const pEl = document.getElementById('cal-partner');
  const tEl = document.getElementById('cal-type');
  window._mktCalState.filterPartner = pEl ? pEl.value : 'All';
  window._mktCalState.filterType    = tEl ? tEl.value : 'All';
  window._mktCalState.rerender();
}

// ── ROUTING ───────────────────────────────────────────────────────────────────
const TABS=['overview','affiliated','cosell','won','dealsreg2','dealexp','contacts','mktcal','eventplay'];
const rendered={};
function gotoTab(t){
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',TABS[i]===t));
  TABS.forEach(id=>document.getElementById('tab-'+id).style.display=id===t?'':'none');
  if(!rendered[t]){
    if(t==='overview')renderOverview();
    else if(t==='affiliated')renderPipeTab('affiliated');
    else if(t==='cosell')renderPipeTab('cosell');
    else if(t==='won')renderWonTab();
    else if(t==='dealexp')renderDealExp();
    else if(t==='dealsreg2')renderDR2Tab();
    else if(t==='contacts')renderContactsTab();
    else if(t==='mktcal')renderMktCal();
    else if(t==='eventplay')renderEventPlay();
    rendered[t]=true;
  }
}
document.addEventListener('DOMContentLoaded', function(){
  requestAnimationFrame(()=>{ renderOverview(); rendered['overview']=true; });
});
